server:
  port: ${PORT:8080}
  forward-headers-strategy: framework

spring:
  application:
    name: controllusion-backend
  datasource:
    url: ${JDBC_DATABASE_URL:${DB_URL:jdbc:postgresql://localhost:5432/controllusion}}
    username: ${JDBC_DATABASE_USERNAME:${DB_USERNAME:postgres}}
    password: ${JDBC_DATABASE_PASSWORD:${DB_PASSWORD:postgres}}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DB_MAX_POOL_SIZE:10}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
  jackson:
    default-property-inclusion: non_null
  mvc:
    problemdetails:
      enabled: false

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
    tags-sorter: alpha

app:
  security:
    jwt:
      secret: ${JWT_SECRET:change-this-dev-secret-to-a-long-random-string-at-least-32-characters}
      expiration-minutes: ${JWT_EXPIRATION_MINUTES:1440}
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}
  invite:
    temporary-password: ${INVITE_TEMP_PASSWORD:Welcome@123}

logging:
  level:
    org.springframework.security: INFO
